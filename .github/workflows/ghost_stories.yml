name: Ghost Stories Shorts — 10x Daily

on:
  # 10 uploads spread evenly across 24 hours (~every 2.5 hours)
  schedule:
    - cron: "0 0 * * *"    # 00:00 UTC
    - cron: "30 2 * * *"   # 02:30 UTC
    - cron: "0 5 * * *"    # 05:00 UTC
    - cron: "30 7 * * *"   # 07:30 UTC
    - cron: "0 10 * * *"   # 10:00 UTC
    - cron: "30 12 * * *"  # 12:30 UTC
    - cron: "0 15 * * *"   # 15:00 UTC
    - cron: "30 17 * * *"  # 17:30 UTC
    - cron: "0 20 * * *"   # 20:00 UTC
    - cron: "30 22 * * *"  # 22:30 UTC
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional ghost story topic hint (leave blank for random)"
        required: false
        default: ""

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  DEAPI_TOKEN: ${{ secrets.DEAPI_TOKEN }}
  YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
  YT_CLIENT_SECRET_VALUE: ${{ secrets.YT_CLIENT_SECRET_VALUE }}
  YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
  EDGE_TTS_VOICE: "en-US-ChristopherNeural"

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      # Restore story history from previous runs (prevents repeating the same story)
      - name: Restore history cache
        uses: actions/cache/restore@v4
        with:
          path: output/history/
          key: ghost-story-history-${{ github.run_id }}
          restore-keys: |
            ghost-story-history-

      - name: Generate & upload Ghost Story Short
        run: |
          TOPIC="${{ github.event.inputs.topic || '' }}"
          if [ -n "$TOPIC" ]; then
            python scripts/run_short.py --channel ghost_stories --topic "$TOPIC" --upload --privacy public
          else
            python scripts/run_short.py --channel ghost_stories --upload --privacy public
          fi

      # Save history so future runs know which stories have already been told
      - name: Save history cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: output/history/
          key: ghost-story-history-${{ github.run_id }}
